# PostgreSQL + PostGIS ສຳລັບການພັດທະນາ (dev)
# ໃຊ້ image postgis ເພື່ອໃຫ້ extension PostGIS ພ້ອມໃຊ້ ສຳລັບ ST_DWithin / geometry
services:
  db:
    image: postgis/postgis:16-3.4
    container_name: laoland_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: laoland
      POSTGRES_PASSWORD: laoland_dev_pwd
      POSTGRES_DB: laoland
    ports:
      - "5432:5432"
    volumes:
      - laoland_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laoland -d laoland"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  laoland_pgdata:
